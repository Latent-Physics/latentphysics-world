<text x="752" y="488" text-anchor="end" font-size="12.5" fill="#6b21a8" opacity="0.75">编译层</text>
<text x="148" y="512" font-size="12.5" fill="#7e22ce">NVIDIA Warp — Python kernels JIT-compiled to CUDA · CUDA-graph capture &amp; replay</text>
<text x="148" y="534" font-size="12.5" fill="#7e22ce">unified torch / warp stream · zero-copy interop</text>

