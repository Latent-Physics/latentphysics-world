<rect x="100" y="100" width="700" height="470" rx="16" fill="#fbfaf8" stroke="#d8d6d0" stroke-width="1.2"/>
<text x="450" y="130" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Latent Physics World</text>
<text x="450" y="150" text-anchor="middle" font-size="12" fill="#9ca3af">a high-precision, high-speed physics simulator for physical AI</text>

<rect x="128" y="164" width="644" height="88" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
<text x="148" y="188" font-size="15.5" font-weight="600" fill="#1e3a8a">Simulation interface</text>
<text x="752" y="188" text-anchor="end" font-size="12.5" fill="#1e3a8a" opacity="0.75">仿真接口</text>
<text x="148" y="212" font-size="12.5" fill="#1e40af">vectorized batched API · zero-copy PyTorch tensors · snapshot / branch / restore</text>
<text x="148" y="234" font-size="12.5" fill="#1e40af">procedural indoor worlds · asset pipeline (mesh → convex / SDF) · benchmark tasks</text>

<rect x="128" y="264" width="644" height="88" rx="10" fill="#fef3c7" stroke="#fcd34d"/>
<text x="148" y="288" font-size="15.5" font-weight="600" fill="#92400e">Physics</text>
<text x="752" y="288" text-anchor="end" font-size="12.5" fill="#92400e" opacity="0.75">物理</text>
<text x="148" y="312" font-size="12.5" fill="#a16207">contact-accurate rigid dynamics · Newton solver · 8192+ parallel worlds</text>
<text x="148" y="334" font-size="12.5" fill="#a16207">physics sentinels · contact / constraint budgeting · built on mujoco_warp (Apache-2.0)</text>

<rect x="128" y="364" width="644" height="88" rx="10" fill="#ccfbf1" stroke="#5eead4"/>
<text x="148" y="388" font-size="15.5" font-weight="600" fill="#115e59">Render</text>
<text x="752" y="388" text-anchor="end" font-size="12.5" fill="#115e59" opacity="0.75">渲染</text>
<text x="148" y="412" font-size="12.5" fill="#0f766e">native GPU batch renderer — BVH ray-cast RGB · depth · segmentation, all worlds at once</text>
<text x="148" y="434" font-size="12.5" fill="#0f766e">batched LiDAR (multi-ray) · point clouds · camera sensors</text>

<rect x="128" y="464" width="644" height="88" rx="10" fill="#f3e8ff" stroke="#d8b4fe"/>
